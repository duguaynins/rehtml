<!DOCTYPE html>
<html lang="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nins / HTML.SYS</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#FFFFFF">
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}
</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Courier New', 'Consolas', monospace;
  background: #fff; color: #000; height: 100vh; display: flex; flex-direction: column;
  cursor: default;
}
::selection { background: #000; color: #fff; }
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #eee; }
::-webkit-scrollbar-thumb { background: #000; border-radius: 0; }

.toolbar {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 12px; background: #fff;
  border-bottom: 3px double #000; flex-wrap: wrap;
  position: sticky; top: 0; z-index: 10;
}
.toolbar h1 {
  font-size: 0.75rem; color: #000; margin-right: 8px;
  letter-spacing: 2px; text-transform: uppercase;
  padding: 2px 6px; border: 1px solid #000;
}
.toolbar .cursor-blink { animation: blink 1s step-end infinite; }
@keyframes blink { 50% { opacity: 0; } }

.btn {
  background: #fff; color: #000; border: 2px solid #000;
  padding: 5px 12px; cursor: pointer; font-size: 0.7rem;
  font-family: 'Courier New', monospace;
  text-transform: uppercase; letter-spacing: 1px;
  transition: none; font-weight: bold;
}
.btn:hover { background: #000; color: #fff; }
.btn:active { background: #333; }
.btn.outline { opacity: .7; }
.btn.outline:hover { opacity: 1; background: #000; color: #fff; }

.upload-label {
  color: #000; font-size: 0.7rem; cursor: pointer;
  padding: 5px 10px; border: 2px solid #000; opacity: .7;
  text-transform: uppercase; letter-spacing: 1px; font-weight: bold;
}
.upload-label:hover { opacity: 1; background: #000; color: #fff; }
.upload-label input { display: none; }
#fileName { color: #000; font-size: 0.65rem; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; opacity: .7; margin-left: 4px; padding: 2px 6px; border: 1px dashed #000; }

.url-input {
  font-family: 'Courier New', monospace;
  font-size: 0.65rem; padding: 4px 8px;
  border: 2px solid #000; background: #fff;
  color: #000; outline: none; width: 180px;
}
.url-input:focus { background: #fff; }
.url-input::placeholder { color: #000; opacity: .3; text-transform: uppercase; }

.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.preview-panel { display: flex; flex-direction: column; flex: 1; }
.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 12px; background: #e8e8e8; border-bottom: 2px solid #000;
  font-size: 0.7rem; color: #000; text-transform: uppercase; letter-spacing: 1px;
  font-weight: bold;
}
#preview { flex: 1; background: #fff; border: none; }

.statusbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 12px; background: #e8e8e8;
  border-top: 3px double #000;
  font-size: 0.65rem; color: #000; text-transform: uppercase; letter-spacing: 1px;
  font-weight: bold;
}
.statusbar .blink { animation: blink 1s step-end infinite; }

.error-msg {
  display: none; padding: 8px 12px;
  background: #fff; color: #000;
  font-size: 0.7rem; border-bottom: 3px double #000;
  font-weight: bold;
}
.error-msg.show { display: block; }

.drop-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85);
  display: none; align-items: center; justify-content: center;
  z-index: 1000; flex-direction: column; gap: 16px;
}
.drop-overlay.show { display: flex; }
.drop-overlay .drop-icon {
  font-size: 48px; color: #fff; opacity: .5;
  border: 4px dashed #fff; padding: 32px 64px;
}
.drop-overlay .drop-text {
  font-size: 1rem; color: #fff; text-transform: uppercase;
  letter-spacing: 2px; font-weight: bold;
}

dialog {
  border: 3px double #000; background: #fff; padding: 0;
  min-width: 360px; max-width: 500px; width: 90%;
  font-family: 'Courier New', monospace; color: #000;
}
dialog::backdrop { background: rgba(0,0,0,0.7); }
.dialog-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px; background: #000; color: #fff;
  font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; font-weight: bold;
}
.dialog-body {
  padding: 12px; max-height: 300px; overflow-y: auto;
  font-size: 0.75rem; line-height: 1.6;
}
.dialog-filters {
  display: flex; gap: 4px; flex-wrap: wrap;
  padding: 6px 12px; border-bottom: 1px solid #000;
  font-size: 0.65rem;
}
.filter-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border: 1px solid #000; cursor: pointer;
  text-transform: uppercase; letter-spacing: 1px;
  user-select: none;
}
.filter-tag.hidden { opacity: .35; text-decoration: line-through; }
.filter-tag:hover { background: #000; color: #fff; }
.dialog-footer {
  display: flex; gap: 6px; justify-content: flex-end;
  padding: 8px 12px; border-top: 2px solid #000;
}
.log-entry { margin-bottom: 4px; white-space: pre-wrap; word-break: break-all; }
.log-entry.error { color: #000; font-weight: bold; }
.log-entry.error::before { content: '! '; }
.log-entry.info { color: #000; opacity: .7; }
.log-entry.info::before { content: '> '; }
.log-entry.success { color: #000; }
.log-entry.success::before { content: 'OK '; }

@media (min-width: 768px) {
  .toolbar h1 { font-size: 0.85rem; }
}
</style>
</head>
<body>
<div class="toolbar">
  <h1>C:\&gt;<span class="cursor-blink">&#9608;</span></h1>
  <button class="btn outline" id="logBtn">[LOG]</button>
  <label class="upload-label">[LOAD]<input type="file" id="fileInput" accept=".html,.htm"></label>
  <span id="fileName"></span>
  <input style="display: none;" type="text" class="url-input" id="urlInput" placeholder="URL...">
  <button style="display: none;" class="btn" id="urlGoBtn">&gt; GO</button>
  <span style="flex:1"></span>
</div>

<div class="error-msg" id="errorMsg">ERROR</div>
<div class="main">
  <div class="preview-panel">
    <div class="panel-header"><span>&#62; PREVIEW</span></div>
    <div style="padding:20px; width:100%; height:100%; background: #000;">
      <iframe 
          id="preview"
          style="
              width:100%;
              height:100%;
              border:8px solid #CCC;
              border-top-width:5px;
              border-right-width:22px;
              border-bottom-width:5px;
              border-left-width:22px;
          ">
      </iframe>
    </div>
  </div>
</div>

<div class="drop-overlay" id="dropOverlay">
  <div class="drop-icon">&#9733;</div>
  <div class="drop-text">DROP HTML FILE HERE</div>
</div>

<div class="statusbar">
  <span>&gt; READY</span>
  <span>DOS HTML VIEWER v1.0</span>
  <span id="statusTime"></span>
</div>

<dialog id="logDialog">
  <div class="dialog-header">
    <span>C:\&gt; LOG</span>
    <span id="logCount">0</span>
  </div>
  <div class="dialog-filters" id="logFilters"></div>
  <div class="dialog-body" id="logContent"></div>
  <div class="dialog-footer">
    <button class="btn outline" id="clearLogBtn">[CLEAR]</button>
    <button class="btn" id="closeLogBtn">[X]</button>
  </div>
</dialog>

<script>
const preview = document.getElementById('preview');
const fileInput = document.getElementById('fileInput');
const fileName = document.getElementById('fileName');
const urlInput = document.getElementById('urlInput');
const urlGoBtn = document.getElementById('urlGoBtn');
const errorMsg = document.getElementById('errorMsg');
const statusTime = document.getElementById('statusTime');
const logBtn = document.getElementById('logBtn');
const logDialog = document.getElementById('logDialog');
const logContent = document.getElementById('logContent');
const logCount = document.getElementById('logCount');
const clearLogBtn = document.getElementById('clearLogBtn');
const closeLogBtn = document.getElementById('closeLogBtn');
const logFilters = document.getElementById('logFilters');
const dropOverlay = document.getElementById('dropOverlay');

const LOG_TYPES = ['error', 'info', 'success'];
const filterState = {};
LOG_TYPES.forEach(t => filterState[t] = true);

let dragCounter = 0;

function buildFilters() {
  logFilters.innerHTML = '';
  LOG_TYPES.forEach(t => {
    const tag = document.createElement('span');
    tag.className = 'filter-tag';
    tag.textContent = t;
    tag.dataset.type = t;
    tag.addEventListener('click', () => {
      filterState[t] = !filterState[t];
      tag.classList.toggle('hidden', !filterState[t]);
      applyFilters();
    });
    logFilters.appendChild(tag);
  });
}

function applyFilters() {
  logContent.querySelectorAll('.log-entry').forEach(el => {
    const type = el.dataset.logType;
    el.style.display = filterState[type] ? '' : 'none';
  });
}

window.onerror = function (msg, url, line, col, err) {
  const info = (url ? url.split('/').pop() + ':' + line : '') + ' ' + msg;
  log('[SYSTEM] ' + info, 'error');
};

window.addEventListener('unhandledrejection', function (e) {
  log('[PROMISE] ' + (e.reason.message || e.reason), 'error');
});

const origConsoleError = console.error;
const origConsoleWarn = console.warn;
console.error = function () {
  log('[CONSOLE] ' + Array.from(arguments).join(' '), 'error');
  origConsoleError.apply(console, arguments);
};
console.warn = function () {
  log('[CONSOLE] ' + Array.from(arguments).join(' '), 'info');
  origConsoleWarn.apply(console, arguments);
};

function addBodyPadding(html) {
  return html.replace(/<body([^>]*)>/i, (m, attrs) => {
    const m2 = attrs.match(/style\s*=\s*(["'])(.*?)\1/i);
    if (m2) {
      const q = m2[1], val = m2[2];
      return m.replace(m2[0], 'style=' + q + val + ';padding:16px' + q);
    }
    return '<body' + attrs + ' style="padding:16px">';
  });
}

function loadHTML(content, source) {
  let injected = content.includes('</head>')
    ? content.replace('</head>', `<script>
window.onerror = function(m, u, l) {
  parent.postMessage({ type: 'preview-error', msg: m + ' (line ' + l + ')' }, '*');
};
window.addEventListener('unhandledrejection', function(e) {
  parent.postMessage({ type: 'preview-error', msg: 'Promise: ' + (e.reason.message||e.reason) }, '*');
});
<\/script></head>`)
    : '<script>' +
`window.onerror = function(m, u, l) {
  parent.postMessage({ type: 'preview-error', msg: m + ' (line ' + l + ')' }, '*');
};
window.addEventListener('unhandledrejection', function(e) {
  parent.postMessage({ type: 'preview-error', msg: 'Promise: ' + (e.reason.message||e.reason) }, '*');
};` + '<\/script>' + content;
  injected = addBodyPadding(injected);
  try {
    preview.srcdoc = injected;
    errorMsg.classList.remove('show');
  } catch (e) {
    showError('EXECUTION ERROR: ' + e.message);
  }
  log('LOADED: ' + source, 'info');
}

function showError(msg) {
  errorMsg.textContent = '! ' + msg;
  errorMsg.classList.add('show');
  log(msg, 'error');
}

function log(msg, type) {
  type = type || 'info';
  const entry = document.createElement('div');
  entry.className = 'log-entry ' + type;
  entry.dataset.logType = type;
  entry.textContent = msg;
  logContent.appendChild(entry);
  logContent.scrollTop = logContent.scrollHeight;
  logCount.textContent = logContent.children.length;
  applyFilters();
}

function processFile(file) {
  if (!file.name.match(/\.html?$/i)) {
    showError('INVALID FILE: .html ONLY');
    return;
  }
  fileName.textContent = file.name;
  const reader = new FileReader();
  reader.onload = e => loadHTML(e.target.result, file.name);
  reader.onerror = () => showError('READ ERROR');
  reader.readAsText(file);
}

function loadURL(url) {
  if (!url.trim()) return;
  const fullURL = url.match(/^https?:\/\//) ? url : 'https://' + url;
  log('FETCHING: ' + fullURL, 'info');
  fetch(fullURL)
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(html => {
      loadHTML(html, fullURL);
      urlInput.value = fullURL;
    })
    .catch(err => showError('FETCH ERROR: ' + err.message));
}

fileInput.addEventListener('change', () => {
  const f = fileInput.files[0];
  if (f) processFile(f);
});

urlGoBtn.addEventListener('click', () => loadURL(urlInput.value));
urlInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') loadURL(urlInput.value);
});

document.addEventListener('dragenter', e => {
  e.preventDefault();
  dragCounter++;
  if (dragCounter === 1) dropOverlay.classList.add('show');
});

document.addEventListener('dragleave', e => {
  e.preventDefault();
  dragCounter--;
  if (dragCounter === 0) dropOverlay.classList.remove('show');
});

document.addEventListener('dragover', e => e.preventDefault());

document.addEventListener('drop', e => {
  e.preventDefault();
  dragCounter = 0;
  dropOverlay.classList.remove('show');
  const files = e.dataTransfer.files;
  if (files.length > 0) {
    const file = files[0];
    if (file.name.match(/\.html?$/i)) {
      processFile(file);
    } else {
      const urlData = e.dataTransfer.getData('text/uri-list');
      if (urlData) {
        loadURL(urlData.trim());
      } else {
        showError('DROP .html FILE ONLY');
      }
    }
  }
});

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'o') {
    e.preventDefault(); fileInput.click();
  }
});

window.addEventListener('message', function (e) {
  if (e.data && e.data.type === 'preview-error') {
    showError('[PREVIEW] ' + e.data.msg);
  }
});

logBtn.addEventListener('click', () => logDialog.showModal());
clearLogBtn.addEventListener('click', () => {
  logContent.innerHTML = '';
  logCount.textContent = '0';
});
closeLogBtn.addEventListener('click', () => logDialog.close());

function updateClock() {
  const now = new Date();
  statusTime.textContent = now.toLocaleTimeString('zh-TW', { hour12: false });
}
updateClock();
setInterval(updateClock, 1000);

buildFilters();
</script>
</body>
</html>
