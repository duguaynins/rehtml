<!DOCTYPE html>
<html lang="auto">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>nins/ReHTML</title>



<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#FFFFFF">
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');

    <!-- 載入 Ace 編輯器主核心與擴充功能 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.35.4/ace.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.35.4/ext-language_tools.min.js"></script>

    <!-- 載入 NES.css 與 8-bit Google 像素字型 -->
    <link rel="stylesheet" href="https://unpkg.com/nes.css/css/nes.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Press Start 2P', monospace;
            background: #212529; /* NES.css 預設暗色背景 */
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        /* 讓編輯器佔滿整個螢幕 */
        #editor {
            width: 100%;
            height: 100%;
        }

        /* 左下角懸浮控制按鈕 - 經典 NES 綠色按鈕 */
        #toggle-menu-btn {
            position: fixed;
            bottom: 20px;
            left: 20px; /* 初始在左邊 */
            right: auto;
            z-index: 10000;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            /* 加入平移與左右位置變更的過場動畫 */
            transition: transform 0.3s ease-in-out, left 0.3s ease-in-out, right 0.3s ease-in-out;
        }
        #toggle-menu-btn.up {
            transform: translateY(-75px);
        }

        /* 底部彈出工具列 */
        #toolbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 75px;
            background: #212529;
            border-top: 4px solid #fff;
            color: white;
            display: flex;
            align-items: center;
            justify-content: flex-end; 
            gap: 15px;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 9999;
            
            /* 預設完全隱藏在螢幕下方 */
            transform: translateY(75px);
            transition: transform 0.3s ease-in-out;
        }

        /* 當工具列被激活時歸位 */
        #toolbar.active {
            transform: translateY(0);
        }

        /* NES 樣式微調 */
        .nes-select select {
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            height: 45px;
        }
        
        .nes-btn {
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            height: 45px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        /* 隱藏原生檔案輸入框 */
        #openFile {
            display: none;
        }

        /* REVIEW: iframe 全螢幕預覽 */
        #preview-frame {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1;
            background: white;
        }

        /* LOG: console 輸出面板 */
        #log-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            color: #FFFFFF;/*#00ff00*/
            font-family: 'Courier New', monospace;
            font-size: 14px;
            overflow-y: auto;
            z-index: 1;
            padding: 16px;
            box-sizing: border-box;
        }

        #log-output {
            white-space: pre-wrap;
            word-break: break-all;
        }
    </style>
</head>
<body>

<!-- 左下角控制按鈕 (預設使用 nes-btn is-success 綠色) -->
<button id="toggle-menu-btn" class="nes-btn is-success" onclick="toggleToolbar()">MENU</button>

<!-- 底部彈出工具列 -->
<div id="toolbar">
    <!-- MODE 切換: EDIT / REVIEW / LOG -->
    <div class="nes-select is-dark" style="width: 130px; margin-bottom: 0;">
        <select id="mode" onchange="changeViewMode()">
            <option value="edit">EDIT</option>
            <option value="review">REVIEW</option>
            <option value="log">LOG</option>
        </select>
    </div>

    <!-- 匯入檔案按鈕 -->
    <label for="openFile" class="nes-btn is-primary" style="margin-bottom: 0;">IMPORT</label>
    <input type="file" id="openFile" onchange="openFile()">

    <!-- 下載檔案按鈕 -->
    <button class="nes-btn" style="margin-bottom: 0;" onclick="downloadFile()">DOWNLOAD</button>
</div>

<!-- 編輯器區塊 -->
<div id="editor"></div>

<!-- REVIEW: iframe 預覽 -->
<iframe id="preview-frame" style="display:none;"></iframe>

<!-- LOG: console 輸出面板 -->
<div id="log-panel" style="display:none;">
    <div id="log-output"></div>
</div>

<script>
    // 1. 初始化 Ace 編輯器
    const editor = ace.edit("editor");
    editor.setTheme("ace/theme/monokai");
    editor.setFontSize(16);

    // 2. 啟用自動完成提示
    editor.setOptions({
        enableBasicAutocompletion: true,
        enableLiveAutocompletion: true,
        enableSnippets: true
    });

    // 3. 預設初始內容
    /*
    const defaultCode = `# 8-BIT ACE EDITOR
# [AUTO-SAVE: ON]

def start_game():
    print("WELCOME TO THE NES WORLD!")
`;*/
    const defaultCode = `<!DOCTYPE html>
<html>
<head>
    <title>nins/Editor</title>
</head>
<body>
    <h1>Hello, World.</h1>
</body>
</html>`;

    // 4. 載入暫存或預設內容
    let oldCode = localStorage.getItem("ace_code");
    if (oldCode) {
        editor.setValue(oldCode, -1);
    } else {
        editor.setValue(defaultCode, -1);
    }
    editor.session.setMode("ace/mode/html");
    editor.session.setUseWorker(false);
    document.getElementById("mode").value = "edit";
    changeViewMode();

    let capturedLogs = '';
    let _origLog, _origWarn, _origError;

    // 隨時捕捉 console 輸出
    captureConsole();

    // ⚡ 自動儲存監聽
    editor.on("input", function() {
        localStorage.setItem("ace_code", editor.getValue());
    });

    // 用來記錄下一次關閉選單時按鈕應該去哪邊 (預設下一次去右邊)
    let nextPosition = "right";

    // 🛠️ 處理選單開關與按鈕左右飄移的邏輯
    function toggleToolbar() {
        const toolbar = document.getElementById("toolbar");
        const btn = document.getElementById("toggle-menu-btn");
        
        // 切換工具列狀態與按鈕往上平移
        toolbar.classList.toggle("active");
        btn.classList.toggle("up");
        
        if (btn.classList.contains("up")) {
            // 【展開選單時】
            btn.innerHTML = "CLOSE";
            btn.classList.remove("is-success");
            btn.classList.add("is-error"); // 變紅色
            
            // 展開時固定在目前那一側的上方，不打亂使用者點擊焦點
        } else {
            // 【關閉選單時】
            btn.innerHTML = "MENU";
            btn.classList.remove("is-error");
            btn.classList.add("is-success"); // 變回綠色
            
            // 根據 nextPosition 決定按鈕降落在哪一邊，並切換下一次的方向
            if (nextPosition === "right") {
                btn.style.left = "auto";
                btn.style.right = "20px";
                nextPosition = "left"; // 下一次點擊關閉時去左邊
            } else {
                btn.style.right = "auto";
                btn.style.left = "20px";
                nextPosition = "right"; // 下一次點擊關閉時去右邊
            }
        }
    }

    // 攔截 iframe 內部的 console
    function captureIframeConsole(iframeWin) {
        iframeWin.console.log = function(...args) {
            const line = '[LOG---IFRAME] ' + args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)).join(' ') + '\n';
            capturedLogs += line;
        };
        iframeWin.console.warn = function(...args) {
            const line = '[WARN--IFRAME] ' + args.map(a => String(a)).join(' ') + '\n';
            capturedLogs += line;
        };
        iframeWin.console.error = function(...args) {
            const line = '[ERROR-IFRAME] ' + args.map(a => String(a)).join(' ') + '\n';
            capturedLogs += line;
        };
    }

    // MODE 切換: EDIT / REVIEW / LOG
    function changeViewMode() {
        const mode = document.getElementById("mode").value;
        const preview = document.getElementById("preview-frame");
        const logPanel = document.getElementById("log-panel");
        const editorEl = document.getElementById("editor");

        preview.style.display = "none";
        logPanel.style.display = "none";
        editorEl.style.display = "block";
        editor.setReadOnly(false);

        if (mode === "edit") {
            editor.setReadOnly(false);
        } else if (mode === "review") {
            editor.setReadOnly(true);
            editorEl.style.display = "none";
            preview.style.display = "block";

            ///capturedLogs = ''; 
            ///capturedLogs = '[SYSTEM] REVIEW...\n'; 
            capturedLogs += '[REVIEW] ...\n'; 
            ///document.getElementById('log-output').textContent = '[SYSTEM] No logs yet.';
            captureIframeConsole(preview.contentWindow);
            const doc = preview.contentWindow.document;
            doc.open();
            doc.write(editor.getValue());
            doc.close();
            ///document.getElementById('logContent').innerHTML = '';
            ///document.getElementById('logCount').textContent = '0';
            
        } else if (mode === "log") {
            editor.setReadOnly(true);
            editorEl.style.display = "none";
            logPanel.style.display = "block";
            document.getElementById("log-output").textContent = capturedLogs || '[SYSTEM] No logs yet.';  /// Import a file to run.
        }
    }

    // 攔截 console 輸出
    function captureConsole() {
        capturedLogs = '';
        _origLog = console.log;
        _origWarn = console.warn;
        _origError = console.error;

        console.log = function(...args) {
            const line = '[LOG] ' + args.map(a => typeof a === 'object' ? JSON.stringify(a, null, 2) : String(a)).join(' ') + '\n';
            capturedLogs += line;
            _origLog.apply(console, args);
        };
        console.warn = function(...args) {
            const line = '[WARN] ' + args.map(a => String(a)).join(' ') + '\n';
            capturedLogs += line;
            _origWarn.apply(console, args);
        };
        console.error = function(...args) {
            const line = '[ERROR] ' + args.map(a => String(a)).join(' ') + '\n';
            capturedLogs += line;
            _origError.apply(console, args);
        };
    }

    function restoreConsole() {
        if (_origLog) {
            console.log = _origLog;
            console.warn = _origWarn;
            console.error = _origError;
            _origLog = null;
        }
    }

    // 匯入並開啟檔案（寫入 iframe 執行，攔截 console）
    function openFile(){
        let file = document.getElementById("openFile").files[0];
        if (!file) return;

        let reader = new FileReader();
        reader.onload = function(){
            const code = reader.result;
            editor.setValue(code, -1);
            document.getElementById("mode").value = "edit";
            changeViewMode();

            // 寫入 iframe 執行 HTML，攔截 console
            capturedLogs = '';
            const preview = document.getElementById("preview-frame");
            captureIframeConsole(preview.contentWindow);
            const doc = preview.contentWindow.document;
            doc.open();
            doc.write(code);
            doc.close();

            toggleToolbar();
        };
        reader.readAsText(file);
    }

    // 副檔名對應 MIME Type
    function mimeType(name){
        return "text/html";
    }

    // 下載檔案
    function downloadFile(){
        let filename = `nins_edit_${Date.now()}.html`;

        let blob = new Blob([editor.getValue()], { type: "text/html" });
        let a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        a.click();
        
        URL.revokeObjectURL(a.href);
        toggleToolbar();
        localStorage.removeItem("ace_code");
        editor.setReadOnly(true);
        editor.container.style.backgroundColor = "#CCCCCC";
    }

    toggleToolbar();
</script>



</body>
</html>
